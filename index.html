<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Broken Lamp Tavern — RPG Engine</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- ── Header ──────────────────────────── -->
    <header>
      <div class="dot"></div>
      <h1>🍺 The Broken Lamp Tavern</h1>
      <div class="model-tag">Elara · qwen3.5-4b</div>
    </header>

    <!-- ── Stats Panel (left) ──────────────── -->
    <aside id="stats-panel">
      <h3>Player Stats</h3>

      <div id="relationship-badge" class="relationship-badge rel-stranger">Stranger</div>

      <div class="stat-row bar-friendship">
        <div class="stat-label"><span>❤️ Friendship</span><span id="val-friendship">10</span></div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-friendship" style="width:10%"></div></div>
      </div>
      <div class="stat-row bar-respect">
        <div class="stat-label"><span>⚔️ Respect</span><span id="val-respect">10</span></div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-respect" style="width:10%"></div></div>
      </div>
      <div class="stat-row bar-trust">
        <div class="stat-label"><span>🔒 Trust</span><span id="val-trust">5</span></div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-trust" style="width:5%"></div></div>
      </div>
      <div class="stat-row bar-health">
        <div class="stat-label"><span>💚 Health</span><span id="val-health">100</span></div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-health" style="width:100%"></div></div>
      </div>

      <div class="stat-gold"><span>🪙</span> <span id="val-gold">50</span> gold</div>

      <h3>Active Flags</h3>
      <div id="flags-container"><div class="inventory-empty">None</div></div>

      <h3>Inventory</h3>
      <div id="inventory-container"><div class="inventory-empty">Empty</div></div>
    </aside>

    <!-- ── Chat Area (center) ──────────────── -->
    <div id="chat-area">
      <div id="chat">
        <div class="welcome">
          <h2>🍺 The Broken Lamp Tavern</h2>
          <p>The door creaks open. Elara looks up from behind the bar counter.</p>
        </div>
      </div>
      <div id="input-area">
        <textarea id="msg" placeholder="Talk to Elara..." rows="1"></textarea>
        <button id="send-btn">Send ▶</button>
      </div>
    </div>

    <!-- ── Engine Log Panel (right) ────────── -->
    <aside id="engine-panel">
      <h3>
        Engine Log
        <span class="toggle-raw" id="toggle-raw-btn">show raw</span>
      </h3>
      <div id="engine-log"></div>
    </aside>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
