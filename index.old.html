<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat - LM Studio</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: #1a1a1a;
        border-bottom: 1px solid #2a2a2a;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      header .dot {
        width: 10px;
        height: 10px;
        background: #22c55e;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      header h1 {
        font-size: 16px;
        font-weight: 600;
        color: #fff;
      }

      header span.model {
        font-size: 13px;
        color: #888;
        margin-left: auto;
      }

      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      #chat::-webkit-scrollbar {
        width: 6px;
      }
      #chat::-webkit-scrollbar-track {
        background: transparent;
      }
      #chat::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 3px;
      }

      .message {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 16px;
        line-height: 1.5;
        font-size: 14px;
        white-space: pre-wrap;
        word-wrap: break-word;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        align-self: flex-end;
        background: #2563eb;
        color: #fff;
        border-bottom-right-radius: 4px;
      }

      .message.assistant {
        align-self: flex-start;
        background: #1e1e1e;
        border: 1px solid #2a2a2a;
        color: #d4d4d4;
        border-bottom-left-radius: 4px;
      }

      .message.assistant.streaming {
        border-color: #3b82f6;
      }

      .typing-indicator {
        display: none;
        align-self: flex-start;
        padding: 12px 16px;
        background: #1e1e1e;
        border: 1px solid #2a2a2a;
        border-radius: 16px;
        border-bottom-left-radius: 4px;
        gap: 4px;
      }

      .typing-indicator.active {
        display: flex;
      }

      .typing-indicator span {
        width: 7px;
        height: 7px;
        background: #555;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out;
      }

      .typing-indicator span:nth-child(1) {
        animation-delay: 0s;
      }
      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0.6);
          opacity: 0.4;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      #input-area {
        background: #1a1a1a;
        border-top: 1px solid #2a2a2a;
        padding: 16px 24px;
        display: flex;
        gap: 12px;
      }

      #input-area textarea {
        flex: 1;
        background: #262626;
        border: 1px solid #333;
        color: #e0e0e0;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 14px;
        font-family: inherit;
        resize: none;
        outline: none;
        min-height: 46px;
        max-height: 150px;
        transition: border-color 0.2s;
      }

      #input-area textarea:focus {
        border-color: #3b82f6;
      }

      #input-area textarea::placeholder {
        color: #666;
      }

      #send-btn {
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 0 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #send-btn:hover {
        background: #1d4ed8;
      }
      #send-btn:disabled {
        background: #333;
        color: #666;
        cursor: not-allowed;
      }

      .welcome {
        text-align: center;
        color: #555;
        margin: auto;
        font-size: 14px;
        line-height: 1.8;
      }

      .welcome h2 {
        font-size: 22px;
        color: #888;
        margin-bottom: 8px;
      }

      /* Engine & Tool tag styling */
      .tag-engine {
        display: inline-block;
        background: #1a1a2e;
        border: 1px solid #4a3f8a;
        border-radius: 6px;
        padding: 4px 8px;
        margin: 4px 0;
        font-size: 12px;
        color: #a78bfa;
        font-family: "Consolas", monospace;
      }

      .tag-tool {
        display: inline-block;
        background: #1a2e1a;
        border: 1px solid #3f8a4a;
        border-radius: 6px;
        padding: 4px 8px;
        margin: 4px 0;
        font-size: 12px;
        color: #86efac;
        font-family: "Consolas", monospace;
      }

      .tag-tool::before {
        content: "⚙️ ";
      }
      .tag-engine::before {
        content: "🧠 ";
      }
    </style>
  </head>
  <body>
    <header>
      <div class="dot"></div>
      <h1>🍺 Taverna da Lâmpada Quebrada</h1>
      <span class="model">Elara · qwen3.5-4b</span>
    </header>

    <div id="chat">
      <div class="welcome">
        <h2>🍺 Taverna da Lâmpada Quebrada</h2>
        <p>
          Elara está atrás do balcão, polindo um copo. Ela olha pra você e
          sorri.
        </p>
      </div>
    </div>

    <div id="input-area">
      <textarea id="msg" placeholder="Fale com Elara..." rows="1"></textarea>
      <button id="send-btn">Enviar ▶</button>
    </div>

    <script>
      const API_URL = "http://localhost:1234/api/v1/chat";
      const MODEL = "qwen3.5-4b";

      const SYSTEM_PROMPT = `# ELARA RPG

      You are Elara, 28 years old, owner and waitress of The Broken Lamp Tavern.
You are a real person in this world, never mention AI, models, or prompts.

PERSONALITY

Sharp, observant, quick-tongued

Knows the city’s gossip

Can fight

Welcoming to those who respect her, cold to those who cross boundaries

Sarcastic humor, loyal to those who earn her trust

Responses: short (2–5 sentences), only Elara’s dialogue.

ENGINE

The ENGINE decides important actions based on attributes: FRIENDSHIP, RESPECT, TRUST.

You do not store or modify these attributes.

You may only speak or act after receiving [ENGINE_RESPONSE].

ENGINE USAGE RULES

Call the ENGINE only for important actions (giving items, intimate invitations, leaving the tavern, combat, sharing secrets).

Never speak in character before the ENGINE responds.

No narration, comments, or internal thoughts.

Stop and wait for the response.

The ENGINE’s reason field is only for internal logic and must never be used in dialogue.

If the ENGINE returns tool=NULL, only speak based on the decision (allowed, denied, conditional).

DECISION FLOW
1 — LLM sends ENGINE_REQUEST

When an action requires a decision:

[ENGINE_REQUEST]
action=<name>
target=<optional>
seriousness=<0-10>
context="<short description of the player’s request>"
[/ENGINE_REQUEST]

Stop immediately after sending.

Do not speak in character until receiving ENGINE_RESPONSE.

2 — ENGINE responds

[ENGINE_RESPONSE]
decision=ALLOWED | DENIED | CONDITIONAL
action=<name>
tool=<name or NULL>
reason="<internal logic info, not for dialogue>"
[/ENGINE_RESPONSE]

3 — LLM continues in character

Speak only as Elara.

If a tool is provided → invoke it using its parameters.

If DENIED → refuse naturally.

If CONDITIONAL → respond cautiously.

Never incorporate the reason field into dialogue.

SERIOUSNESS SCALE

0–2 → trivial
3–4 → social / light
5–6 → personal
7–8 → risky or intimate
9–10 → extreme / dangerous / intimate

AVAILABLE TOOLS
Drinks

serve_drink | type=beer | wine | mead | water | special

Food

cook_food | dish=soup | cheese_bread | roast_meat | stew

Movement

go_to | destination=tavern | market | port | castle | forest | mines

Invitations

invite | type=drink | talk | adventure | date

Combat

start_fight | target=bandits | monster | guard | arena

Information

share_rumor | topic=king | guards | smuggling | merchants | dungeon

Items

give_item | item=potion | map | dagger | key

Refusal

refuse | reason=<text>

GENERAL RULES

Do not invent tools.

Speak only as Elara or use tools.

No speech before ENGINE when called.

Responses must be short, natural, realistic.

Tools may appear in dialogue naturally.

START OF CONVERSATION

When the player enters:

“Ah… another traveler.
Welcome to the Broken Lamp Tavern.
Do you want a drink, some food… or just a place to rest?”`;

      const chatEl = document.getElementById("chat");
      const msgEl = document.getElementById("msg");
      const sendBtn = document.getElementById("send-btn");

      let previousResponseId = null;
      let isStreaming = false;

      // Auto-resize textarea
      msgEl.addEventListener("input", () => {
        msgEl.style.height = "auto";
        msgEl.style.height = Math.min(msgEl.scrollHeight, 150) + "px";
      });

      // Enter to send (Shift+Enter for newline)
      msgEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      sendBtn.addEventListener("click", sendMessage);

      function scrollToBottom() {
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function renderContent(div, text) {
        // Parse [ENGINE: ...] and [TOOL: ...] tags into styled spans
        div.innerHTML = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\n/g, "<br>")
          .replace(
            /\[ENGINE:([^\]]+)\]/g,
            '<span class="tag-engine">ENGINE:$1</span>',
          )
          .replace(
            /\[TOOL:([^\]]+)\]/g,
            '<span class="tag-tool">TOOL:$1</span>',
          );
      }

      function addMessage(role, content) {
        // Remove welcome message
        const welcome = chatEl.querySelector(".welcome");
        if (welcome) welcome.remove();

        const div = document.createElement("div");
        div.className = `message ${role}`;
        if (role === "user") {
          div.textContent = content;
        } else {
          renderContent(div, content);
        }
        chatEl.appendChild(div);
        scrollToBottom();
        return div;
      }

      async function sendMessage() {
        const text = msgEl.value.trim();
        if (!text || isStreaming) return;

        isStreaming = true;
        sendBtn.disabled = true;

        // Show user message
        addMessage("user", text);
        msgEl.value = "";
        msgEl.style.height = "auto";

        // Create assistant message placeholder
        const assistantDiv = addMessage("assistant", "");
        assistantDiv.classList.add("streaming");

        try {
          const body = {
            model: MODEL,
            input: text,
            stream: true,
            temperature: 0.8,
            max_output_tokens: 2048,
            store: true,
            system_prompt: SYSTEM_PROMPT,
          };

          // Stateful chat: append to previous response
          if (previousResponseId) {
            body.previous_response_id = previousResponseId;
          }

          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

          if (!response.ok) {
            throw new Error(`Erro ${response.status}: ${response.statusText}`);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let fullContent = "";
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const parts = buffer.split("\n\n");
            buffer = parts.pop(); // keep incomplete chunk

            for (const part of parts) {
              const lines = part.split("\n");
              let eventType = "";
              let eventData = "";

              for (const line of lines) {
                if (line.startsWith("event: ")) {
                  eventType = line.slice(7).trim();
                } else if (line.startsWith("data: ")) {
                  eventData = line.slice(6).trim();
                }
              }

              if (!eventData) continue;

              try {
                const json = JSON.parse(eventData);

                if (
                  eventType === "message.delta" ||
                  json.type === "message.delta"
                ) {
                  fullContent += json.content;
                  renderContent(assistantDiv, fullContent);
                  scrollToBottom();
                }

                if (
                  eventType === "reasoning.delta" ||
                  json.type === "reasoning.delta"
                ) {
                  fullContent += json.content;
                  renderContent(assistantDiv, fullContent);
                  scrollToBottom();
                }

                if (eventType === "chat.end" || json.type === "chat.end") {
                  if (json.result?.response_id) {
                    previousResponseId = json.result.response_id;
                  }
                  // Show stats
                  const stats = json.result?.stats;
                  if (stats) {
                    const statsEl = document.createElement("div");
                    statsEl.style.cssText =
                      "font-size:11px;color:#555;margin-top:6px;";
                    statsEl.textContent = `${stats.tokens_per_second?.toFixed(1)} tok/s · ${stats.total_output_tokens} tokens · ${stats.time_to_first_token_seconds?.toFixed(2)}s TTFT`;
                    assistantDiv.appendChild(statsEl);
                  }
                }
              } catch {}
            }
          }
        } catch (err) {
          assistantDiv.textContent = `⚠️ Erro: ${err.message}\n\nVerifique se o servidor LM Studio está rodando (lms server start).`;
          assistantDiv.style.borderColor = "#ef4444";
        } finally {
          assistantDiv.classList.remove("streaming");
          isStreaming = false;
          sendBtn.disabled = false;
          msgEl.focus();
        }
      }
    </script>
  </body>
</html>
